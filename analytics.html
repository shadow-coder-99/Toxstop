<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxstop Analytics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            min-height: 100vh;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 240px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            padding: 24px;
            display: flex; 
            flex-direction: column;
            gap: 32px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: #58a6ff;
            font-size: 1.2rem;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }
        .nav-item {
            display: block;
            padding: 10px 12px;
            border-radius: 6px;
            color: #8b949e;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .nav-item.active, .nav-item:hover {
            background-color: #21262d;
            color: #f0f6fc;
        }
        /* Main Workspace Styling */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .header-area {
            margin-bottom: 32px;
        }
        .header-area h1 {
            font-size: 1.6rem;
            color: #f0f6fc;
        }
        .placeholder-box {
            background-color: #161b22;
            border: 1px dashed #30363d;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-area">
            <span>🛡️</span> Toxstop
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item">Dashboard</a></li>
            <li><a href="#" class="nav-item">Customers</a></li>
            <li><a href="analytics.html" class="nav-item active">Analytics</a></li>
            <li><a href="settings.html" class="nav-item">Settings</a></li>
        </ul>
    </div>

    <!-- MAIN ANALYTICS CONTENT -->
    <div class="main-content">
        <div class="header-area">
            <h1>Threat Analytics Center</h1>
        </div>

        <div class="placeholder-box">
            <p>📊 Analytics charts and trend lines are being wired up next!</p>
        </div>
    </div>

</body>
</html>
