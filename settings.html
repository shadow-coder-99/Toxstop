<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxStop - Settings</title>
    <style>
        body { font-family: sans-serif; background-color: #121214; color: #ffffff; padding: 40px; }
        .card { background: #1a1a1e; padding: 24px; border-radius: 8px; border: 1px solid #2a2a30; max-width: 500px; }
        h1 { color: #00ff88; margin-top: 0; }
        .toggle-group { margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #00ff88; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-back { background: #333; color: #fff; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Shield Settings</h1>
        <p>Configure your digital protection layers.</p>
        
        <div class="toggle-group">
            <span>Block Toxic Software Effects</span>
            <input type="checkbox" checked style="transform: scale(1.5);">
        </div>

        <div class="toggle-group">
            <span>Aggressive Protection Mode</span>
            <input type="checkbox" style="transform: scale(1.5);">
        </div>

        <a href="index.html" class="btn btn-back">← Back to Dashboard</a>
    </div>

</body>
</html>
